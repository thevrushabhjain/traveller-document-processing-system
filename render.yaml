# Render Blueprint - deploys backend (Docker web service), frontend
# (Docker web service) and a managed PostgreSQL database in one shot.
# https://render.com/docs/blueprint-spec
databases:
  - name: traveldocs-db
    plan: free
    databaseName: traveldocs
    user: traveldocs

services:
  - type: web
    name: traveldocs-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: traveldocs-db
          property: connectionString
      - key: APP_NAME
        value: Traveller Document Processing System
      - key: LOG_LEVEL
        value: INFO
      - key: OCR_LANGUAGES
        value: en,hi
      - key: CORS_ORIGINS
        value: "*"
      - key: PORT
        value: 8000

  - type: web
    name: traveldocs-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          name: traveldocs-backend
          type: web
          property: hostport
